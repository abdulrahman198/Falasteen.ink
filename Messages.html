<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="styles.css"/>
<script src="app-config.js"></script>
<script src="common.js"></script>
<script src="app.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>الرسائل | FALASTEEN.INK</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0e0e0e; --s1:#131313; --s2:#1c1b1b; --s3:#201f1f; --s4:#353534; --red:#E8221F; --red2:#930006; --green:#00b954; --text:#e5e2e1; --dim:#9a9898; }
body { background:var(--bg); color:var(--text); font-family:Arial,"Segoe UI",Tahoma,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.topnav { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:rgba(14,14,14,.97); border-bottom:1px solid rgba(93,63,59,.12); flex-shrink:0; }
.logo { font-family:"Courier New",monospace; font-weight:900; font-size:1rem; letter-spacing:.08em; color:var(--text); text-decoration:none; }
.logo-dot { color:var(--red); }
.lang-btn { background:var(--s2); border:1px solid rgba(93,63,59,.3); color:var(--dim); font-size:.68rem; font-family:"Courier New",monospace; padding:5px 10px; cursor:pointer; }
.lang-btn:hover { background:var(--red); color:#fff; }

/* LAYOUT */
.layout { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:280px; border-left:1px solid rgba(93,63,59,.12); display:flex; flex-direction:column; flex-shrink:0; }
@media(max-width:600px){ .sidebar{ width:100%; } .chat-area{ display:none; } .sidebar.hidden{ display:none; } .chat-area.active{ display:flex; } }
.sidebar-header { padding:14px 18px; border-bottom:1px solid rgba(93,63,59,.1); }
.sidebar-title { font-size:.92rem; font-weight:900; margin-bottom:10px; }
.search-conv { width:100%; background:var(--s4); border:1px solid rgba(93,63,59,.3); color:var(--text); font-size:.84rem; padding:9px 12px; outline:none; font-family:Arial,sans-serif; }
.search-conv:focus { border-color:var(--red); }
.search-conv::placeholder { color:var(--dim); }
.conv-list { flex:1; overflow-y:auto; scrollbar-width:thin; }
.conv-item { padding:14px 18px; display:flex; gap:12px; align-items:center; cursor:pointer; transition:background .15s; border-bottom:1px solid rgba(93,63,59,.06); }
.conv-item:hover { background:var(--s2); }
.conv-item.active { background:rgba(232,34,31,.08); border-right:3px solid var(--red); }
.conv-av { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; font-weight:700; color:#fff; flex-shrink:0; }
.conv-info { flex:1; min-width:0; }
.conv-name { font-size:.88rem; font-weight:700; margin-bottom:2px; }
.conv-preview { font-size:.76rem; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.conv-time { font-family:"Courier New",monospace; font-size:.52rem; color:var(--dim); flex-shrink:0; }
.conv-unread { width:18px; height:18px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-size:.56rem; color:#fff; font-weight:700; flex-shrink:0; }
.new-msg-btn { margin:12px 18px; padding:11px; background:linear-gradient(135deg,var(--red),var(--red2)); color:#fff; border:none; cursor:pointer; font-size:.8rem; font-weight:700; width:calc(100%-36px); display:flex; align-items:center; justify-content:center; gap:6px; }
.new-msg-btn:hover { box-shadow:0 4px 16px rgba(232,34,31,.4); }

/* CHAT AREA */
.chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-header { padding:14px 18px; border-bottom:1px solid rgba(93,63,59,.12); display:flex; gap:12px; align-items:center; flex-shrink:0; }
.back-btn { background:none; border:none; color:var(--dim); font-size:1.2rem; cursor:pointer; padding:4px; display:none; }
@media(max-width:600px){ .back-btn{display:block;} }
.chat-av { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.86rem; font-weight:700; color:#fff; flex-shrink:0; }
.chat-name { font-size:.96rem; font-weight:700; }
.chat-status { font-family:"Courier New",monospace; font-size:.52rem; color:var(--green); margin-top:2px; }
.chat-msgs { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; }
.msg { display:flex; gap:8px; max-width:80%; }
.msg.mine { align-self:flex-end; flex-direction:row-reverse; }
.msg.theirs { align-self:flex-start; }
.msg-av { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.64rem; font-weight:700; color:#fff; flex-shrink:0; margin-top:auto; }
.msg-bubble { padding:10px 14px; border-radius:2px; font-size:.86rem; line-height:1.5; max-width:100%; word-break:break-word; }
.msg.mine .msg-bubble { background:linear-gradient(135deg,var(--red),var(--red2)); color:#fff; }
.msg.theirs .msg-bubble { background:var(--s2); color:var(--text); }
.msg-time { font-family:"Courier New",monospace; font-size:.5rem; color:var(--dim); margin-top:4px; text-align:center; }
.system-msg { text-align:center; font-family:"Courier New",monospace; font-size:.58rem; color:var(--dim); padding:6px 12px; background:var(--s4); display:inline-block; align-self:center; margin:4px 0; }

/* INPUT */
.chat-input-wrap { padding:12px 18px; border-top:1px solid rgba(93,63,59,.12); display:flex; gap:8px; align-items:center; flex-shrink:0; }
.chat-input { flex:1; background:var(--s4); border:1px solid rgba(93,63,59,.3); color:var(--text); font-size:.9rem; padding:11px 14px; outline:none; font-family:Arial,sans-serif; transition:border-color .2s; }
.chat-input:focus { border-color:var(--red); }
.chat-input::placeholder { color:var(--dim); }
.send-btn { width:44px; height:44px; background:linear-gradient(135deg,var(--red),var(--red2)); border:none; cursor:pointer; color:#fff; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:transform .2s; flex-shrink:0; }
.send-btn:hover { transform:scale(1.05); }
.attach-btn { width:36px; height:36px; background:none; border:1px solid rgba(93,63,59,.3); cursor:pointer; color:var(--dim); font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.attach-btn:hover { border-color:var(--red); color:var(--red); }

/* EMPTY CHAT */
.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
.empty-icon { font-size:3rem; opacity:.2; }
.empty-title { font-size:1rem; font-weight:700; }
.empty-desc { font-size:.82rem; color:var(--dim); text-align:center; line-height:1.7; }

/* NEW MSG MODAL */
.overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.9); display:none; align-items:flex-end; justify-content:center; }
.overlay.on { display:flex; }
.modal { background:var(--s1); width:100%; max-width:480px; padding:22px 18px 32px; border-top:3px solid var(--red); }
.modal-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-title { font-size:.96rem; font-weight:900; }
.modal-close { background:none; border:none; color:var(--dim); font-size:1.3rem; cursor:pointer; }
.lbl { font-family:"Courier New",monospace; font-size:.52rem; color:var(--red); letter-spacing:.18em; display:block; margin-bottom:6px; }
.inp { width:100%; background:var(--s4); border:1px solid rgba(93,63,59,.3); color:var(--text); font-size:.88rem; padding:11px 13px; outline:none; font-family:Arial,sans-serif; margin-bottom:12px; }
.inp:focus { border-color:var(--red); }
.inp::placeholder { color:var(--dim); }
.start-btn { width:100%; padding:13px; background:linear-gradient(135deg,var(--red),var(--red2)); color:#fff; border:none; cursor:pointer; font-size:.88rem; font-weight:700; }

.nav-icon { font-size:1.25rem; line-height:1; }
</style>
</head>
<body>

<nav class="topnav">
  <a href="Index.html" class="logo">FALASTEEN<span class="logo-dot">.</span>INK</a>
  <a  class="donate-btn" href="donate.html">تبرع / Donate</a>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
</nav>

<div class="layout">

  <!-- CONVERSATIONS SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" id="sidebarTitle">الرسائل / Messages</div>
      <input type="text" class="search-conv" id="convSearch" placeholder="ابحث في المحادثات / Search..." oninput="filterConvs()"/>
    </div>
    <div class="conv-list" id="convList"></div>
    <button class="new-msg-btn" onclick="openNewMsg()">✏ رسالة جديدة / New Message</button>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="empty-chat" id="emptyChat">
      <span class="empty-icon">💬</span>
      <div class="empty-title" id="emptyTitle">اختر محادثة</div>
      <p class="empty-desc" id="emptyDesc">اختر محادثة من القائمة أو ابدأ محادثة جديدة مع أحد الحراس.</p>
    </div>
    <div id="activeChat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header" id="chatHeader"></div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-wrap">
        <button class="attach-btn" onclick="attachFile()">📎</button>
        <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة / Type a message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW MESSAGE MODAL -->
<div class="overlay" id="newMsgModal" onclick="if(event.target===this)closeNewMsg()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="newMsgTitle">رسالة جديدة / New Message</div>
      <button class="modal-close" onclick="closeNewMsg()">✕</button>
    </div>
    <label class="lbl">اسم الحارس / Guardian Name *</label>
    <input type="text" class="inp" id="newRecipient" placeholder="ابحث عن حارس / Search guardian..."/>
    <label class="lbl">الرسالة الأولى / First message</label>
    <input type="text" class="inp" id="newFirstMsg" placeholder="اكتب رسالتك / Your message..." onkeydown="if(event.key==='Enter')startConversation()"/>
    <button class="start-btn" onclick="startConversation()" id="startBtn">إرسال / Send</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="Index.html"><span class="nav-icon">🏠</span>Home</a>
  <a href="Feed.html"><span class="nav-icon">▶</span>Reels</a>
  <a href="live.html"><span class="nav-icon">🔴</span>Live</a>
  <a href="Martyrs.html"><span class="nav-icon">🕊</span>Martyrs</a>
  <a href="Messages.html"><span class="nav-icon">💬</span>Messages</a>
</nav>

<script>
var isAr = true;
var MSGS_KEY = 'fl_messages';
var activeConvId = null;
var session = null;

async function initMessagesUser() {
  try {
    var user = await FL.getUser();
    if (user) session = user;
  } catch(e) {
    session = null;
  }
}

var COLORS = ['#E8221F','#006633','#1a1a6e','#5a3000','#003a1a'];

function getConvs() { try{return JSON.parse(localStorage.getItem(MSGS_KEY)||'{}');}catch(e){return {};} }
function saveConvs(d) { localStorage.setItem(MSGS_KEY, JSON.stringify(d)); }

function myName() {
  if (!session) return 'أنت';
  return (session.user_metadata && session.user_metadata.name) || (session.email ? session.email.split('@')[0] : 'أنت');
}
function myInitial() { return (myName()||'?')[0].toUpperCase(); }

// ── RENDER CONVERSATIONS ──
function renderConvs() {
  var convs = getConvs();
  var list = document.getElementById('convList');
  var keys = Object.keys(convs);
  var search = document.getElementById('convSearch').value.trim().toLowerCase();

  if (keys.length === 0) {
    list.innerHTML = '<div style="padding:24px 18px;text-align:center;font-size:.8rem;color:var(--dim);">لا توجد محادثات بعد.<br/>ابدأ محادثة جديدة!</div>';
    return;
  }

  list.innerHTML = '';
  keys.filter(function(k){
    return !search || convs[k].name.toLowerCase().includes(search);
  }).sort(function(a,b){
    var ta = convs[a].msgs && convs[a].msgs.length ? new Date(convs[a].msgs[convs[a].msgs.length-1].time) : 0;
    var tb = convs[b].msgs && convs[b].msgs.length ? new Date(convs[b].msgs[convs[b].msgs.length-1].time) : 0;
    return tb - ta;
  }).forEach(function(id) {
    var conv = convs[id];
    var lastMsg = conv.msgs && conv.msgs.length ? conv.msgs[conv.msgs.length-1] : null;
    var unread = conv.unread || 0;
    var colorIdx = id.charCodeAt(0) % COLORS.length;

    var item = document.createElement('div');
    item.className = 'conv-item' + (id===activeConvId?' active':'');
    item.onclick = function(){ openConv(id); };
    item.innerHTML =
      '<div class="conv-av" style="background:'+COLORS[colorIdx]+'">'+esc((conv.name||'?')[0].toUpperCase())+'</div>'+
      '<div class="conv-info">'+
        '<div class="conv-name">'+esc(conv.name)+'</div>'+
        '<div class="conv-preview">'+(lastMsg?esc(lastMsg.text.substring(0,35)):'—')+'</div>'+
      '</div>'+
      (lastMsg?'<div class="conv-time">'+fmtTime(lastMsg.time)+'</div>':'')+
      (unread>0?'<div class="conv-unread">'+unread+'</div>':'');
    list.appendChild(item);
  });
}

function filterConvs() { renderConvs(); }

// ── OPEN CONVERSATION ──
function openConv(id) {
  activeConvId = id;
  var convs = getConvs();
  var conv = convs[id];
  if (!conv) return;

  // Mark as read
  conv.unread = 0;
  saveConvs(convs);

  var colorIdx = id.charCodeAt(0) % COLORS.length;

  // Header
  document.getElementById('chatHeader').innerHTML =
    '<button class="back-btn" onclick="backToList()">←</button>'+
    '<div class="chat-av" style="background:'+COLORS[colorIdx]+'">'+esc(conv.name[0].toUpperCase())+'</div>'+
    '<div><div class="chat-name">'+esc(conv.name)+'</div><div class="chat-status">🟢 '+( isAr?'متصل / Online':'Online')+'</div></div>';

  // Render messages
  renderMsgs(id);

  document.getElementById('emptyChat').style.display = 'none';
  document.getElementById('activeChat').style.display = 'flex';
  document.getElementById('chatInput').focus();
  renderConvs();
}

function renderMsgs(id) {
  var convs = getConvs();
  var conv = convs[id];
  var container = document.getElementById('chatMsgs');
  container.innerHTML = '';

  var sysMsg = document.createElement('div');
  sysMsg.className = 'system-msg';
  sysMsg.textContent = isAr ? 'بداية المحادثة / Conversation start' : 'Conversation start';
  container.appendChild(sysMsg);

  (conv.msgs||[]).forEach(function(m) {
    var isMine = m.sender === myName();
    var colorIdx = (conv.name||'?').charCodeAt(0) % COLORS.length;

    var msg = document.createElement('div');
    msg.className = 'msg ' + (isMine?'mine':'theirs');
    msg.innerHTML =
      (isMine?'':'<div class="msg-av" style="background:'+COLORS[colorIdx]+'">'+esc(conv.name[0].toUpperCase())+'</div>')+
      '<div><div class="msg-bubble">'+esc(m.text)+'</div><div class="msg-time">'+fmtTime(m.time)+'</div></div>'+
      (isMine?'<div class="msg-av" style="background:var(--red);">'+esc(myInitial())+'</div>':'');
    container.appendChild(msg);
  });

  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text || !activeConvId) return;

  var convs = getConvs();
  var conv = convs[activeConvId];
  if (!conv) return;

  if (!conv.msgs) conv.msgs = [];
  conv.msgs.push({ sender: myName(), text: text, time: new Date().toISOString() });
  saveConvs(convs);
  input.value = '';
  renderMsgs(activeConvId);
  renderConvs();

  // Simulate reply after 1-2 seconds
  setTimeout(function() {
    var replies = [
      'شكراً على تواصلك 🕊',
      'تم الاستلام — سأرد قريباً',
      'نعم، أنا معك',
      'جزاك الله خيراً على هذا التوثيق',
      'سأشارك هذا مع الحراس الآخرين',
      'فلسطين ستبقى حرة 🇵🇸'
    ];
    var reply = replies[Math.floor(Math.random()*replies.length)];
    var convs2 = getConvs();
    var conv2 = convs2[activeConvId];
    if (conv2) {
      if (!conv2.msgs) conv2.msgs = [];
      conv2.msgs.push({ sender: conv2.name, text: reply, time: new Date().toISOString() });
      saveConvs(convs2);
      if (activeConvId) renderMsgs(activeConvId);
      renderConvs();
    }
  }, 3000 + Math.random()*4000); // slower replies
}

function attachFile() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,video/*,audio/*,.pdf';
  input.onchange = function() {
    if (input.files[0]) {
      var name = input.files[0].name;
      document.getElementById('chatInput').value = '📎 ' + name;
    }
  };
  input.click();
}

function backToList() {
  activeConvId = null;
  document.getElementById('emptyChat').style.display = 'flex';
  document.getElementById('activeChat').style.display = 'none';
}

// ── NEW MESSAGE ──
function openNewMsg() {
  document.getElementById('newMsgModal').classList.add('on');
  setTimeout(function(){ document.getElementById('newRecipient').focus(); }, 100);
}
function closeNewMsg() {
  document.getElementById('newMsgModal').classList.remove('on');
  document.getElementById('newRecipient').value = '';
  document.getElementById('newFirstMsg').value = '';
}

function startConversation() {
  var name = document.getElementById('newRecipient').value.trim();
  var firstMsg = document.getElementById('newFirstMsg').value.trim();
  if (!name) { document.getElementById('newRecipient').focus(); return; }

  var convs = getConvs();
  var id = 'conv_' + name.toLowerCase().replace(/\s+/g,'_') + '_' + Date.now();

  convs[id] = { name: name, msgs: [], unread: 0 };

  if (firstMsg) {
    convs[id].msgs.push({ sender: myName(), text: firstMsg, time: new Date().toISOString() });
  }

  saveConvs(convs);
  closeNewMsg();
  renderConvs();
  openConv(id);
}

// ── LANGUAGE ──
function toggleLang() {
  isAr = !isAr;
  document.documentElement.setAttribute('dir', isAr?'rtl':'ltr');
  document.documentElement.setAttribute('lang', isAr?'ar':'en');
  document.getElementById('langBtn').textContent = isAr?'EN':'AR';
  document.getElementById('sidebarTitle').textContent = isAr?'الرسائل / Messages':'Messages / الرسائل';
  document.getElementById('convSearch').placeholder = isAr?'ابحث / Search...':'Search...';
  document.getElementById('emptyTitle').textContent = isAr?'اختر محادثة':'Select a conversation';
  document.getElementById('emptyDesc').textContent = isAr?'اختر محادثة من القائمة أو ابدأ محادثة جديدة.':'Select a conversation or start a new one.';
  document.getElementById('chatInput').placeholder = isAr?'اكتب رسالة / Type...':'Type a message...';
}

// ── HELPERS ──
function fmtTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var now = new Date();
  var diff = (now-d)/1000;
  if (diff<60) return isAr?'الآن':'now';
  if (diff<3600) return Math.floor(diff/60)+(isAr?'د':'m');
  if (diff<86400) return Math.floor(diff/3600)+(isAr?'س':'h');
  return d.toLocaleDateString('ar-SA');
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──
window.addEventListener('load', async function() {
  await initMessagesUser();

  // Add sample conversations if empty
  var convs = getConvs();
  if (Object.keys(convs).length === 0) {
    convs['conv_radar'] = {
      name: 'حارس الذاكرة',
      msgs: [
        {sender:'حارس الذاكرة', text:'مرحباً بك في FALASTEEN.INK 🕊 أنا هنا لمساعدتك في التوثيق.', time: new Date(Date.now()-3600000).toISOString()},
        {sender:'حارس الذاكرة', text:'لا تتردد في إضافة أي معلومة تعرفها عن الشهداء أو المعالم.', time: new Date(Date.now()-3500000).toISOString()}
      ],
      unread: 2
    };
    convs['conv_noor'] = {
      name: 'حارس ١',
      msgs: [
        {sender:'حارس ١', text:'شاركت معك ملف الصحفيين الشهداء — هل وصلك؟', time: new Date(Date.now()-86400000).toISOString()}
      ],
      unread: 1
    };
    saveConvs(convs);
  }
  renderConvs();
});
</script>
<script src="fl-nav.js" defer></script>
</body>
