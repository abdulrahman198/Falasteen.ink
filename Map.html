<script>
function filterMarkers(q) {
  console.log('[FLMap] filterMarkers called.', q);
  if (!window.mapMarkers) return;
  q = (q||'').toLowerCase();
  mapMarkers.forEach(function(item) {
    var match = !q || item.name.toLowerCase().includes(q) || (item.city||'').toLowerCase().includes(q);
    if (item.marker) {
      if (match) item.marker.addTo(window.mapInstance);
      else item.marker.remove();
    }
  });
}

</script>

<!-- Leaflet.js - Free, no API key needed -->

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0e0e0e; --s1:#131313; --s2:#1c1b1b; --s3:#201f1f; --s4:#353534; --red:#E8221F; --red2:#930006; --green:#00b954; --text:#e5e2e1; --dim:#9a9898; }
body { background:var(--bg); color:var(--text); font-family:Arial,"Segoe UI",Tahoma,sans-serif; min-height:100vh; padding-bottom:70px; }

.topnav { position:fixed; top:0; width:100%; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:rgba(14,14,14,.97); border-bottom:1px solid rgba(93,63,59,.12); }
.logo { font-family:"Courier New",monospace; font-weight:900; font-size:1rem; letter-spacing:.08em; color:var(--text); text-decoration:none; }
.logo-dot { color:var(--red); }
.add-link { font-family:"Courier New",monospace; font-size:.62rem; color:var(--red); text-decoration:none; }

/* MAP */
.map-wrap { margin-top:54px; position:relative; }
#map { width:100%; height:55vh; background:var(--s4); z-index:1; }

/* Custom marker style */
.custom-marker { background:var(--red); width:12px; height:12px; border-radius:50%; border:3px solid rgba(232,34,31,.3); box-shadow:0 0 0 6px rgba(232,34,31,.15); }

/* STATS */
.stats-bar { background:var(--s2); padding:12px 18px; display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
.stat-item { text-align:center; }
.stat-num { font-family:"Courier New",monospace; font-size:1.1rem; font-weight:900; color:var(--red); }
.stat-lbl { font-family:"Courier New",monospace; font-size:.46rem; color:var(--dim); letter-spacing:.12em; }

/* FILTERS */
.filters { padding:10px 18px; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; background:var(--s1); border-bottom:1px solid rgba(93,63,59,.1); }
.filters::-webkit-scrollbar { display:none; }
.chip { font-size:.7rem; font-weight:600; padding:6px 13px; background:var(--s2); color:var(--dim); border:none; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; transition:all .2s; font-family:Arial,sans-serif; }
.chip.on { color:var(--red); border-bottom-color:var(--red); background:rgba(232,34,31,.06); }

/* SEARCH */
.search-bar { padding:10px 18px; background:var(--s2); display:flex; gap:8px; align-items:center; }
.search-input { flex:1; background:var(--s4); border:1px solid rgba(93,63,59,.3); color:var(--text); font-size:.86rem; padding:9px 13px; outline:none; font-family:Arial,sans-serif; }
.search-input:focus { border-color:var(--red); }
.search-input::placeholder { color:var(--dim); }

/* LIST */
.section-lbl { font-family:"Courier New",monospace; font-size:.52rem; color:var(--red); letter-spacing:.22em; padding:12px 18px 8px; display:flex; align-items:center; justify-content:space-between; }
.section-lbl a { color:var(--dim); text-decoration:none; font-size:.52rem; }
.landmarks { padding:0 18px; display:flex; flex-direction:column; gap:2px; margin-bottom:24px; }
.lm-card { background:var(--s2); padding:13px; display:flex; gap:12px; align-items:center; cursor:pointer; transition:background .2s; }
.lm-card:hover { background:var(--s3); }
.lm-icon { width:40px; height:40px; background:var(--s4); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
.lm-name { font-size:.86rem; font-weight:700; margin-bottom:2px; }
.lm-meta { font-family:"Courier New",monospace; font-size:.5rem; color:var(--dim); }
.lm-type { display:inline-block; font-family:"Courier New",monospace; font-size:.46rem; color:var(--green); background:rgba(0,185,84,.06); border:1px solid rgba(0,185,84,.18); padding:2px 6px; margin-top:3px; }
.lm-arrow { color:var(--dim); font-size:.8rem; flex-shrink:0; }
.empty { padding:40px 18px; text-align:center; }
.empty-icon { font-size:2rem; opacity:.25; margin-bottom:10px; display:block; }
.empty-text { font-size:.82rem; color:var(--dim); line-height:1.7; margin-bottom:14px; }
.empty-btn { display:inline-block; background:linear-gradient(135deg,var(--red),var(--red2)); color:#fff; font-size:.78rem; font-weight:700; padding:10px 20px; text-decoration:none; }

/* ADD FAB */
.fab { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,var(--red),var(--red2)); color:#fff; border:none; cursor:pointer; padding:12px 28px; font-size:.8rem; font-weight:700; letter-spacing:.06em; box-shadow:0 6px 24px rgba(232,34,31,.4); z-index:150; text-decoration:none; display:flex; align-items:center; gap:8px; }

/* DETAIL MODAL */
.modal-overlay { position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.88); display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.on { display:flex; }
.modal { background:var(--s1); width:100%; max-width:540px; max-height:85vh; overflow-y:auto; padding:20px 18px 28px; border-top:3px solid var(--red); scrollbar-width:none; }
.modal::-webkit-scrollbar { display:none; }
.modal-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-title { font-size:1rem; font-weight:900; }
.modal-close { background:none; border:none; color:var(--dim); font-size:1.3rem; cursor:pointer; }
.before-after { display:grid; grid-template-columns:1fr 1fr; gap:2px; margin-bottom:12px; }
.ba { height:100px; background:var(--s4); display:flex; align-items:center; justify-content:center; font-size:2rem; position:relative; overflow:hidden; }
.ba img { width:100%; height:100%; object-fit:cover; }
.ba-lbl { position:absolute; bottom:4px; font-family:"Courier New",monospace; font-size:.44rem; padding:2px 6px; background:rgba(0,0,0,.75); }
.ba-before .ba-lbl { left:4px; color:var(--green); }
.ba-after .ba-lbl { right:4px; color:var(--red); }
.m-name { font-size:1rem; font-weight:900; margin-bottom:4px; }
.m-meta { font-family:"Courier New",monospace; font-size:.52rem; color:var(--dim); margin-bottom:10px; line-height:1.7; }
.m-desc { font-size:.82rem; color:var(--dim); line-height:1.7; margin-bottom:12px; }
.m-locate-btn { width:100%; padding:12px; background:rgba(0,185,84,.08); border:1px solid rgba(0,185,84,.25); color:var(--green); cursor:pointer; font-size:.8rem; font-weight:700; transition:background .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.m-locate-btn:hover { background:rgba(0,185,84,.15); }

/* LANG */
.lang-btn { background:var(--s2); border:1px solid rgba(93,63,59,.3); color:var(--dim); font-size:.68rem; font-family:"Courier New",monospace; padding:5px 10px; cursor:pointer; transition:all .2s; }
.lang-btn:hover { background:var(--red); color:#fff; border-color:var(--red); }

.nav-icon { font-size:1.25rem; line-height:1; }
</style>
</head>

  <button class="chip" onclick="filter('heritage',this)">🏛 تراث</button>
  <button class="chip" onclick="filter('residential',this)">🏘 سكني</button>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="حنظلة — Hanzala"><title>حنظلة</title><!-- Head --><circle cx="12" cy="5.5" r="3" fill="currentColor" opacity=".15"/><circle cx="12" cy="5.5" r="3"/><!-- Hair spikes --><line x1="9.5" y1="3" x2="8.5" y2="1.5"/><line x1="11" y1="2.5" x2="10.5" y2="1"/><line x1="12.5" y1="2.5" x2="12.5" y2="1"/><line x1="14" y1="3" x2="15" y2="1.5"/><!-- Body --><path d="M9 8.5 Q12 9.5 15 8.5 L14.5 14 Q12 14.5 9.5 14 Z" fill="currentColor" opacity=".1"/><path d="M9 8.5 Q12 9.5 15 8.5 L14.5 14 Q12 14.5 9.5 14 Z"/><!-- Arms behind back --><path d="M9.5 10 Q7 11 7.5 12.5 Q8 13.5 9.5 13.5"/><!-- Left leg --><path d="M10 14 L9 19 L8 21"/><!-- Right leg --><path d="M14 14 L15 19 L16 21"/><!-- Bare feet (no shoes) --><path d="M7.5 21 Q7 21.5 6.5 21" stroke-width="2"/><!-- Back turned — no face drawn --></svg></span>
  <input type="text" class="search-input" id="searchInp" placeholder="ابحث / Search..." oninput="renderList()"/>
</div>

<!-- LIST -->
<div class="section-lbl">

</div>

  <div class="modal" id="detailContent"></div>

<script>
var isAr = true;
var currentFilter = 'all';
var mapInstance = null;
var markersLayer = null;

var TYPE_ICONS = {mosque:'🕌',hospital:'🏥',school:'🏫',heritage:'🏛',residential:'🏘',cultural:'🎭',other:'📍'};
var TYPE_LABELS_AR = {mosque:'مسجد',hospital:'مستشفى',school:'مدرسة / جامعة',heritage:'تراث تاريخي',residential:'سكني',cultural:'ثقافي',other:'أخرى'};
var TYPE_LABELS_EN = {mosque:'Mosque',hospital:'Hospital',school:'School / University',heritage:'Heritage',residential:'Residential',cultural:'Cultural',other:'Other'};

// Default coords for Gaza areas
var CITY_COORDS = {
  'غزة':         [31.5017, 34.4674],
  'غزة المدينة': [31.5017, 34.4674],
  'الشجاعية':    [31.4934, 34.4879],
  'جباليا':      [31.5315, 34.4836],
  'بيت لاهيا':   [31.5519, 34.4883],
  'خان يونس':    [31.3452, 34.3065],
  'رفح':         [31.2958, 34.2441],
  'بيت حانون':   [31.5396, 34.5326],
  'النصيرات':    [31.4393, 34.3875],
  'دير البلح':   [31.4152, 34.3503]
};

// Gaza center
var GAZA_CENTER = [31.4175, 34.3324];
var GAZA_BOUNDS = [[31.20, 34.15], [31.60, 34.60]];

// ── INIT MAP ──
function initMap() {
  mapInstance = L.map('map', {
    center: GAZA_CENTER,
    zoom: 11,
    zoomControl: true,
    attributionControl: false
  });

  // OpenStreetMap tiles (free, no API key)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
  }).addTo(mapInstance);

  // Dark overlay to match site theme
  mapInstance.getContainer().style.filter = 'brightness(0.85) contrast(1.1) saturate(0.8)';

  markersLayer = L.layerGroup().addTo(mapInstance);

  // Add Gaza boundary hint
  L.rectangle(GAZA_BOUNDS, {
    color: 'rgba(232,34,31,0.3)',
    weight: 1,
    fill: false,
    dashArray: '5,5'
  }).addTo(mapInstance);

  loadAndRender();
}

// ── DATA ──
function getData() {
  try { return JSON.parse(localStorage.getItem('fl_landmarks') || '[]'); } catch(e) { return []; }
}

// ── RENDER ──
function loadAndRender() {
  var data = getData();

  // Add sample data if empty
  if (data.length === 0) {
    data = [
      {id:'L1',name:'مسجد الشجاعية الكبير',type:'mosque',city:'الشجاعية',builtYear:'1895',destroyedDate:'2024-01-15',desc:'أحد أعرق مساجد غزة. بُني عام 1895 ويتسع لأكثر من 3000 مصلٍّ.',lat:'31.4934',lng:'34.4879',photoBefore:null,photoAfter:null},
      {id:'L2',name:'الجامعة الإسلامية',type:'school',city:'غزة',builtYear:'1978',destroyedDate:'2023-12-09',desc:'أعرق الجامعات في قطاع غزة. خرّجت عشرات الآلاف من الأطباء والمهندسين.',lat:'31.5027',lng:'34.4487',photoBefore:null,photoAfter:null},
      {id:'L3',name:'مستشفى الشفاء',type:'hospital',city:'غزة',builtYear:'1946',destroyedDate:'2024-03-01',desc:'أكبر مستشفى في قطاع غزة. أُسِّس عام 1946.',lat:'31.5236',lng:'34.4502',photoBefore:null,photoAfter:null},
      {id:'L4',name:'سوق الذهب',type:'heritage',city:'غزة',builtYear:'1200',destroyedDate:'2023-11-20',desc:'سوق تاريخي يعود لأكثر من 800 سنة في قلب المدينة القديمة.',lat:'31.5080',lng:'34.4601',photoBefore:null,photoAfter:null},
      {id:'L5',name:'ميناء غزة التاريخي',type:'heritage',city:'غزة',builtYear:'1800',destroyedDate:'2023-10-15',desc:'شريان الحياة لأبناء غزة لعقود.',lat:'31.5200',lng:'34.4320',photoBefore:null,photoAfter:null},
      {id:'L6',name:'جامعة الأزهر — غزة',type:'school',city:'غزة',builtYear:'1991',destroyedDate:'2024-02-10',desc:'إحدى أكبر الجامعات في قطاع غزة.',lat:'31.4980',lng:'34.4440',photoBefore:null,photoAfter:null},
      {id:'L7',name:'مستشفى ناصر',type:'hospital',city:'خان يونس',builtYear:'1955',destroyedDate:'2024-02-15',desc:'أكبر مستشفيات جنوب القطاع.',lat:'31.3452',lng:'34.3065',photoBefore:null,photoAfter:null}
    ];
    localStorage.setItem('fl_landmarks', JSON.stringify(data));
  }

  renderMap(data);
  renderList();
  updateStats(data);
}

function renderMap(data) {
  markersLayer.clearLayers();

  var filtered = currentFilter==='all' ? data : data.filter(function(l){return l.type===currentFilter;});

  filtered.forEach(function(l) {
    var lat = parseFloat(l.lat);
    var lng = parseFloat(l.lng);

    // Fallback to city coords
    if (isNaN(lat) || isNaN(lng)) {
      var c = CITY_COORDS[l.city];
      if (c) { lat=c[0]; lng=c[1]; }
      else { lat=GAZA_CENTER[0]; lng=GAZA_CENTER[1]; }
    }

    // Custom red marker
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;border-radius:50%;background:#E8221F;border:3px solid rgba(232,34,31,.4);box-shadow:0 0 0 6px rgba(232,34,31,.15);"></div>',
      iconSize: [14,14],
      iconAnchor: [7,7]
    });

    var marker = L.marker([lat, lng], {icon:icon});
    marker.on('click', function(){ showDetail(l); });

    // Popup
    var popupContent = '<div style="font-family:Arial,sans-serif;direction:rtl;padding:4px;">' +
      '<div style="font-weight:700;font-size:.86rem;margin-bottom:3px;">' + esc(l.name) + '</div>' +
      '<div style="font-size:.72rem;color:#666;">' + (TYPE_ICONS[l.type]||'📍') + ' ' + esc(l.city||'غزة') + '</div>' +
      '</div>';

    marker.bindPopup(popupContent, {
      closeButton: false,
      maxWidth: 200
    });

    markersLayer.addLayer(marker);
  });
}

function renderList() {
  var data = getData();
  var search = document.getElementById('searchInp').value.trim().toLowerCase();
  var filtered = data.filter(function(l){
    var matchCat = currentFilter==='all' || l.type===currentFilter;
    var matchSearch = !search || (l.name||'').toLowerCase().includes(search) || (l.city||'').toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  var list = document.getElementById('landmarksList');
  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">🏛</span><p class="empty-text">' + (isAr?'لا توجد معالم في هذه الفئة.<br/>أضف أول معلم!':'No landmarks in this category.<br/>Add the first one!') + '</p><a href="Landmarks.html" class="empty-btn">' + (isAr?'+ أضف معلماً':'+ Add Landmark') + '</a></div>';
    return;
  }

  filtered.forEach(function(l) {
    var row = document.createElement('div');
    row.className = 'lm-card';
    row.onclick = function(){ showDetail(l); };
    var typeLabel = isAr ? (TYPE_LABELS_AR[l.type]||'') : (TYPE_LABELS_EN[l.type]||'');
    row.innerHTML =
      '<div class="lm-icon">' + (TYPE_ICONS[l.type]||'📍') + '</div>' +
      '<div style="flex:1;">' +
        '<div class="lm-name">' + esc(l.name) + '</div>' +
        '<div class="lm-meta">📍 ' + esc(l.city||'غزة') + (l.builtYear?' · '+l.builtYear:'') + (l.destroyedDate?' · دُمِّر '+fmtDate(l.destroyedDate):'') + '</div>' +
        '<span class="lm-type">' + typeLabel + '</span>' +
      '</div>' +
      '<span class="lm-arrow">←</span>';
    list.appendChild(row);
  });
}

function updateStats(data) {
  document.getElementById('sTotal').textContent = data.length;
  document.getElementById('sPhoto').textContent = data.filter(function(l){return l.photoBefore||l.photoAfter;}).length;
  var cities = {};
  data.forEach(function(l){if(l.city)cities[l.city]=1;});
  document.getElementById('sCities').textContent = Object.keys(cities).length;
}

function filter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  var data = getData();
  renderMap(data);
  renderList();
}

// ── DETAIL MODAL ──
function showDetail(l) {
  var typeLabel = isAr ? (TYPE_LABELS_AR[l.type]||'') : (TYPE_LABELS_EN[l.type]||'');
  var content = document.getElementById('detailContent');
  var bHtml = l.photoBefore ? '<img src="'+l.photoBefore+'" alt=""/>' : '<span style="opacity:.2;font-size:2rem;">🏛</span>';
  var aHtml = l.photoAfter ? '<img src="'+l.photoAfter+'" alt=""/>' : '<span style="opacity:.2;font-size:2rem;">💔</span>';
  var lat = l.lat || (CITY_COORDS[l.city]||GAZA_CENTER)[0];
  var lng = l.lng || (CITY_COORDS[l.city]||GAZA_CENTER)[1];

  content.innerHTML =
    '<div class="modal-hdr"><div class="modal-title">' + esc(l.name) + '</div><button class="modal-close" onclick="closeDetail()">✕</button></div>' +
    '<div class="before-after">' +
      '<div class="ba ba-before">' + bHtml + '<span class="ba-lbl">' + (isAr?'قبل':'Before') + '</span></div>' +
      '<div class="ba ba-after">' + aHtml + '<span class="ba-lbl">' + (isAr?'بعد':'After') + '</span></div>' +
    '</div>' +
    '<div class="m-name">' + esc(l.name) + '</div>' +
    '<div class="m-meta">' +
      (TYPE_ICONS[l.type]||'📍') + ' ' + typeLabel + ' · 📍 ' + esc(l.city||'غزة') +
      (l.builtYear ? ' · ' + (isAr?'بُني ':'Built ') + l.builtYear : '') +
      (l.destroyedDate ? '<br/>⚠ ' + (isAr?'دُمِّر في ':'Destroyed ') + fmtDate(l.destroyedDate) : '') +
    '</div>' +
    (l.desc ? '<div class="m-desc">' + esc(l.desc) + '</div>' : '') +
    '<button class="m-locate-btn" onclick="zoomToLocation(' + lat + ',' + lng + ')">📍 ' + (isAr?'انتقل للموقع على الخريطة':'Show on map') + '</button>';

  document.getElementById('detailModal').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('on');
  document.body.style.overflow = '';
}

function zoomToLocation(lat, lng) {
  closeDetail();
  if(window.mapInstance){mapInstance.setView([lat, lng], 15, {animate:true})};
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── LANGUAGE TOGGLE ──
function toggleLang() {
  isAr = !isAr;
  document.documentElement.setAttribute('dir', isAr?'rtl':'ltr');
  document.documentElement.setAttribute('lang', isAr?'ar':'en');
  document.getElementById('langBtn').textContent = isAr ? 'EN' : 'AR';
  document.getElementById('addLink').textContent = isAr ? '+ أضف معلماً' : '+ Add Landmark';
  document.getElementById('fabBtn').textContent = isAr ? '+ وثّق معلماً / Add Landmark' : '+ Add Landmark / وثّق معلماً';
  document.getElementById('searchInp').placeholder = isAr ? 'ابحث / Search...' : 'Search / ابحث...';
  document.getElementById('sTotalLbl').textContent = isAr ? 'معالم / LANDMARKS' : 'LANDMARKS / معالم';
  document.getElementById('sPhotoLbl').textContent = isAr ? 'مع صور / WITH PHOTOS' : 'WITH PHOTOS';
  document.getElementById('sCitiesLbl').textContent = isAr ? 'مدن / CITIES' : 'CITIES / مدن';
  document.getElementById('viewAllLink').textContent = isAr ? 'عرض الكل ←' : 'View All ←';
  renderList();
}

// ── HELPERS ──
function fmtDate(d){if(!d)return'';var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──
window.addEventListener('load', initMap);
</script>
