<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>القبو الرقمي — FALASTEEN.INK</title>
<script src="app-config.js"></script>
<script src="common.js"></script>
<script src="app.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f0f0f0;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
.page{max-width:960px;margin:0 auto;padding:24px 16px 80px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;margin:20px 0 6px;text-align:center}
.sub{color:#666;text-align:center;margin-bottom:28px;font-size:0.9rem;line-height:1.7}
.upload-zone{border:2px dashed rgba(232,34,31,.4);border-radius:20px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(232,34,31,.03);margin-bottom:28px}
.upload-zone:hover,.upload-zone.drag{border-color:#e8221f;background:rgba(232,34,31,.07)}
.upload-icon{font-size:3rem;margin-bottom:12px}
.upload-label{font-size:1rem;font-weight:700;margin-bottom:6px}
.upload-sub{font-size:0.82rem;color:#666}
#fileInput{display:none}
.progress-bar{width:100%;height:6px;background:#1a1a1a;border-radius:4px;margin:14px 0;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#e8221f,#b91c1c);border-radius:4px;width:0;transition:width .3s}
.upload-form{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px;margin-bottom:28px;display:none}
.upload-form h3{margin-bottom:14px;font-size:1rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:0.8rem;color:#888;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:0.9rem;font-family:inherit;direction:rtl}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#e8221f}
.file-preview{display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:10px;padding:12px;margin-bottom:14px}
.file-preview-icon{font-size:2rem}
.file-preview-info{flex:1}
.file-preview-name{font-weight:700;font-size:0.9rem;margin-bottom:2px;word-break:break-all}
.file-preview-size{font-size:0.78rem;color:#666}
.btn-upload{width:100%;padding:13px;background:linear-gradient(135deg,#b91c1c,#7f1d1d);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-upload:disabled{opacity:.5;cursor:not-allowed}
.files-section h2{font-size:1.1rem;font-weight:800;margin-bottom:16px}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.file-card{background:#141414;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;transition:border-color .2s}
.file-card:hover{border-color:rgba(232,34,31,.3)}
.file-thumb{aspect-ratio:16/9;background:#0d0d0d;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;overflow:hidden}
.file-thumb img,.file-thumb video{width:100%;height:100%;object-fit:cover}
.file-body{padding:12px}
.file-name{font-weight:700;font-size:0.88rem;margin-bottom:4px;word-break:break-all;line-height:1.4}
.file-desc{font-size:0.78rem;color:#666;margin-bottom:8px;line-height:1.5}
.file-meta{display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;color:#555}
.file-dl{color:#e8221f;text-decoration:none;font-weight:700}
.no-files{text-align:center;color:#444;padding:40px 20px;border:1px dashed rgba(255,255,255,.05);border-radius:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#166534;color:#fff;padding:12px 22px;border-radius:12px;font-size:0.9rem;display:none;z-index:9999;white-space:nowrap}
</style>
</head>
<body>
<div id="flNav"></div>
<div class="page">
  <h1>📁 القبو الرقمي</h1>
  <p class="sub">ارفع صوراً، فيديوهات، وثائق أو تسجيلات صوتية.<br/>كل ملف يُحفظ للتاريخ — محمي ولا يُحذف.</p>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()" ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
    <div class="upload-icon">📤</div>
    <div class="upload-label">اضغط هنا أو اسحب الملف</div>
    <div class="upload-sub">صور · فيديو · PDF · صوت — حتى 50 ميغا</div>
    <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.docx" onchange="onFileSelected(this.files[0])"/>
  </div>

  <div class="upload-form" id="uploadForm">
    <h3>📎 تفاصيل الملف</h3>
    <div class="file-preview" id="filePreview"></div>
    <div class="form-row">
      <label>عنوان الوثيقة</label>
      <input type="text" id="fileTitle" placeholder="اكتب عنواناً مختصراً..." maxlength="120"/>
    </div>
    <div class="form-row">
      <label>وصف (اختياري)</label>
      <textarea id="fileDesc" rows="2" placeholder="وصف مختصر للمحتوى..."></textarea>
    </div>
    <div class="form-row">
      <label>نوع المحتوى</label>
      <select id="fileCategory">
        <option value="document">وثيقة</option>
        <option value="photo">صورة</option>
        <option value="video">فيديو</option>
        <option value="audio">تسجيل صوتي</option>
        <option value="other">أخرى</option>
      </select>
    </div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="btn-upload" id="uploadBtn" onclick="doUpload()">⬆️ رفع الملف</button>
    <button style="width:100%;margin-top:8px;padding:10px;background:none;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#888;cursor:pointer;font-family:inherit" onclick="cancelUpload()">إلغاء</button>
  </div>

  <div class="files-section">
    <h2>🗃️ الوثائق المرفوعة</h2>
    <div class="files-grid" id="filesGrid"><div class="no-files">جارٍ التحميل...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav style="position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;padding:8px 0;z-index:100">
  <a href="Index.html" style="display:flex;flex-direction:column;align-items:center;color:#666;text-decoration:none;font-size:0.65rem;gap:2px"><span>🏠</span>Home</a>
  <a href="Feed.html" style="display:flex;flex-direction:column;align-items:center;color:#666;text-decoration:none;font-size:0.65rem;gap:2px"><span>▶</span>Reels</a>
  <a href="live.html" style="display:flex;flex-direction:column;align-items:center;color:#666;text-decoration:none;font-size:0.65rem;gap:2px"><span>🔴</span>Live</a>
  <a href="Martyrs.html" style="display:flex;flex-direction:column;align-items:center;color:#666;text-decoration:none;font-size:0.65rem;gap:2px"><span>🕊</span>Martyrs</a>
  <a href="Guardian_hub1.html" style="display:flex;flex-direction:column;align-items:center;color:#e8221f;text-decoration:none;font-size:0.65rem;gap:2px"><span>🛡</span>Guardian</a>
</nav>

<script>
var SUPA = (window.SUPABASE_URL);
var KEY  = (window.SUPABASE_ANON_KEY);
var BUCKET = 'vault-files';
var selectedFile = null;

function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#7f1d1d' : '#166534';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 3500);
}

function fileIcon(type) {
  if (!type) return '📄';
  if (type.startsWith('image')) return '🖼️';
  if (type.startsWith('video')) return '🎬';
  if (type.startsWith('audio')) return '🎙️';
  if (type.includes('pdf')) return '📕';
  return '📄';
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function onDrag(e, over) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.toggle('drag', over);
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if (f) onFileSelected(f);
}

function onFileSelected(file) {
  if (!file) return;
  if (file.size > 50 * 1024 * 1024) { toast('الملف أكبر من 50 ميغا', true); return; }
  selectedFile = file;
  document.getElementById('fileTitle').value = file.name.replace(/\.[^.]+$/, '');
  var cat = document.getElementById('fileCategory');
  if (file.type.startsWith('image')) cat.value = 'photo';
  else if (file.type.startsWith('video')) cat.value = 'video';
  else if (file.type.startsWith('audio')) cat.value = 'audio';
  else if (file.type.includes('pdf') || file.name.endsWith('.pdf')) cat.value = 'document';
  var preview = document.getElementById('filePreview');
  preview.innerHTML = '<div class="file-preview-icon">'+fileIcon(file.type)+'</div><div class="file-preview-info"><div class="file-preview-name">'+file.name+'</div><div class="file-preview-size">'+fmtSize(file.size)+'</div></div>';
  document.getElementById('uploadForm').style.display = 'block';
  document.getElementById('uploadZone').style.display = 'none';
}

function cancelUpload() {
  selectedFile = null;
  document.getElementById('uploadForm').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('fileInput').value = '';
}

async function doUpload() {
  if (!selectedFile) return;
  var title = document.getElementById('fileTitle').value.trim() || selectedFile.name;
  var desc = document.getElementById('fileDesc').value.trim();
  var category = document.getElementById('fileCategory').value;
  var btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الرفع...';
  var bar = document.getElementById('progressBar');
  var fill = document.getElementById('progressFill');
  bar.style.display = 'block'; fill.style.width = '10%';

  try {
    var ext = selectedFile.name.split('.').pop();
    var path = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
    fill.style.width = '40%';

    var uploadRes = await fetch(SUPA + '/storage/v1/object/' + BUCKET + '/' + path, {
      method: 'POST',
      headers: {
        'apikey': KEY,
        'Authorization': 'Bearer ' + KEY,
        'Content-Type': selectedFile.type || 'application/octet-stream',
        'x-upsert': 'true'
      },
      body: selectedFile
    });

    if (!uploadRes.ok) {
      var errText = await uploadRes.text();
      throw new Error('رفع الملف فشل: ' + uploadRes.status + ' — ' + errText);
    }
    fill.style.width = '70%';

    var publicUrl = SUPA + '/storage/v1/object/public/' + BUCKET + '/' + path;

    await fetch(SUPA + '/rest/v1/vault_files', {
      method: 'POST',
      headers: {
        'apikey': KEY,
        'Authorization': 'Bearer ' + KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        title: title,
        description: desc,
        category: category,
        file_path: path,
        file_url: publicUrl,
        file_size: selectedFile.size,
        file_type: selectedFile.type || 'application/octet-stream'
      })
    });

    fill.style.width = '100%';
    toast('✅ تم رفع الملف بنجاح!');
    setTimeout(function(){
      bar.style.display='none'; fill.style.width='0';
      btn.disabled=false; btn.textContent='⬆️ رفع الملف';
      cancelUpload();
      loadFiles();
    }, 800);

  } catch(err) {
    bar.style.display='none'; fill.style.width='0';
    btn.disabled=false; btn.textContent='⬆️ رفع الملف';
    toast(err.message || 'فشل الرفع، حاول مرة أخرى', true);
    console.error(err);
  }
}

async function loadFiles() {
  var grid = document.getElementById('filesGrid');
  try {
    var res = await fetch(SUPA + '/rest/v1/vault_files?order=created_at.desc', {
      headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
    });
    var files = await res.json();
    if (!Array.isArray(files) || files.length === 0) {
      grid.innerHTML = '<div class="no-files">لا توجد وثائق بعد — كن أول من يرفع 📁</div>';
      return;
    }
    grid.innerHTML = files.map(function(f) {
      var icon = fileIcon(f.file_type);
      var thumb = (f.file_type && f.file_type.startsWith('image'))
        ? '<img src="'+f.file_url+'" alt="'+f.title+'" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<span>'+icon+'</span>';
      return '<div class="file-card">'+
        '<div class="file-thumb">'+thumb+'</div>'+
        '<div class="file-body">'+
          '<div class="file-name">'+f.title+'</div>'+
          (f.description ? '<div class="file-desc">'+f.description+'</div>' : '')+
          '<div class="file-meta">'+
            '<span>'+fmtSize(f.file_size||0)+'</span>'+
            '<a href="'+f.file_url+'" target="_blank" class="file-dl">⬇ تحميل</a>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div class="no-files">تعذر تحميل الملفات</div>';
  }
}

document.addEventListener('DOMContentLoaded', loadFiles);
</script>
</body>
</html>
