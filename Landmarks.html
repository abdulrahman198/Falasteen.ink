<script>

var _editingLandmarkId = null;

function editLandmark(id) {
  var landmarks = [];
  try { landmarks = JSON.parse(localStorage.getItem('fl_landmarks')||'[]'); } catch(e){}
  var lm = landmarks.find(function(x){ return x.id === id; });
  if (!lm) return;
  _editingLandmarkId = id;
  // Fill form
  var fields = { lName: lm.name, lCity: lm.city, lType: lm.type, lYear: lm.year, lDesc: lm.desc };
  Object.keys(fields).forEach(function(k){
    var el = document.getElementById(k);
    if (el) el.value = fields[k] || '';
  });
  closeDetail();
  var addModal = document.getElementById('addModal') || document.getElementById('addOverlay') || document.querySelector('.overlay');
  if (addModal) addModal.classList.add('on');
  document.body.style.overflow = 'hidden';
  FL.toast('✏ وضع التعديل / Edit mode');
}

function deleteLandmark(id) {
  if (!confirm('هل أنت متأكد من حذف هذا المعلم؟ / Delete this landmark?')) return;
  var landmarks = [];
  try { landmarks = JSON.parse(localStorage.getItem('fl_landmarks')||'[]'); } catch(e){}
  landmarks = landmarks.filter(function(x){ return x.id !== id; });
  localStorage.setItem('fl_landmarks', JSON.stringify(landmarks));
  closeDetail();
  if (typeof renderLandmarks === 'function') renderLandmarks();
  else if (typeof loadLandmarks === 'function') loadLandmarks();
  FL.toast('✓ تم الحذف / Deleted');
}

</script>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {

  --red: #E8221F; --red2: #930006; --green: #00b954; --text: #e5e2e1; --dim: #9a9898;
}

body { background: var(--bg); color: var(--text); font-family: Arial, "Segoe UI", Tahoma, sans-serif; min-height: 100vh; padding-bottom: 80px; }

.topnav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; background: rgba(14,14,14,0.97); border-bottom: 1px solid rgba(93,63,59,0.15); }

.add-btn { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--red), var(--red2)); color: #fff; font-size: 0.72rem; font-weight: 700; padding: 7px 16px; border: none; cursor: pointer; letter-spacing: 0.04em; }

/* HERO */

.hero::before { content: 'معالم'; position: absolute; bottom: -20px; left: -10px; font-size: clamp(5rem, 20vw, 12rem); font-weight: 900; color: rgba(232,34,31,0.04); pointer-events: none; }
.hero-tag { font-family: "Courier New", monospace; font-size: 0.54rem; color: var(--red); letter-spacing: 0.28em; margin-bottom: 10px; display: block; position: relative; }
.hero-title { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 10px; position: relative; }
.hero-title .red { color: var(--red); }
.hero-desc { font-size: 0.88rem; color: var(--dim); line-height: 1.7; max-width: 480px; position: relative; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-bottom: 2px; }
.stat-card { background: var(--s2); padding: 18px 14px; text-align: center; }
.stat-num { font-size: 1.6rem; font-weight: 900; }

/* FILTERS */

.chip { font-size: 0.72rem; font-weight: 600; padding: 7px 14px; background: var(--s2); color: var(--dim); border: none; cursor: pointer; white-space: nowrap; transition: all 0.2s; border-bottom: 2px solid transparent; font-family: Arial, sans-serif; }
.chip.active { color: var(--red); border-bottom-color: var(--red); background: rgba(232,34,31,0.06); }

/* SEARCH */
.search-bar { margin: 2px 18px 2px; background: var(--s2); padding: 12px 14px; display: flex; gap: 10px; align-items: center; }
.search-input { flex: 1; background: var(--s4); border: 1px solid rgba(93,63,59,0.3); color: var(--text); font-size: 0.88rem; padding: 10px 14px; outline: none; font-family: Arial, sans-serif; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--red); }
.search-input::placeholder { color: var(--dim); }

/* LANDMARKS LIST */
.landmarks { padding: 0 18px; display: flex; flex-direction: column; gap: 2px; margin-bottom: 24px; }

.landmark-card { background: var(--s2); overflow: hidden; cursor: pointer; transition: background 0.2s; }
.landmark-card:hover { background: var(--s3); }

.before-after {
  display: grid; grid-template-columns: 1fr 1fr;
  height: 140px; position: relative;
}
.ba-side { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
.ba-before { background: linear-gradient(135deg, #1a1a2e, #16213e); }
.ba-after { background: linear-gradient(135deg, #1a0505, #2a0a0a); }
.ba-label {
  position: absolute; bottom: 6px;
  font-family: "Courier New", monospace; font-size: 0.5rem; letter-spacing: 0.15em;
  padding: 2px 7px;
}
.ba-before .ba-label { left: 6px; background: rgba(0,0,0,0.7); color: var(--green); }
.ba-after .ba-label { right: 6px; background: rgba(0,0,0,0.7); color: var(--red); }
.ba-divider { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--red); transform: translateX(-50%); z-index: 1; }

.ba-img { width: 100%; height: 100%; object-fit: cover; }

.landmark-body { padding: 14px; }
.landmark-type-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.lm-type { font-family: "Courier New", monospace; font-size: 0.52rem; color: var(--green); background: rgba(0,185,84,0.08); border: 1px solid rgba(0,185,84,0.2); padding: 2px 8px; }

.landmark-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.lm-tag { font-family: "Courier New", monospace; font-size: 0.5rem; color: var(--dim); }
.lm-year { font-family: "Courier New", monospace; font-size: 0.54rem; color: rgba(232,34,31,0.6); }

/* EMPTY */
.empty-state { padding: 48px 18px; text-align: center; }
.empty-icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 12px; display: block; }
.empty-text { font-size: 0.84rem; color: var(--dim); line-height: 1.7; margin-bottom: 16px; }

/* ADD CARD */

.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

.modal-form { display: flex; flex-direction: column; gap: 14px; }

.form-input, .form-select, .form-textarea { width: 100%; background: var(--s4); border: 1px solid rgba(93,63,59,0.3); color: var(--text); font-size: 0.88rem; padding: 11px 13px; outline: none; font-family: Arial, sans-serif; transition: border-color 0.2s; appearance: none; }

</style>
</head>

<script>

var currentFilter = 'all';
var photoBefore = null;
var photoAfter = null;

var TYPE_LABELS = {
  mosque: '🕌 مسجد', hospital: '🏥 مستشفى', school: '🏫 مدرسة/جامعة',
  heritage: '🏛 تراث', residential: '🏘 سكني', cultural: '🎭 ثقافي', other: '◈ أخرى'
};

function getData() {
  try { return JSON.parse(localStorage.getItem('fl_landmarks') || '[]'); }
  catch(e) { return []; }
}
function saveData(d) { localStorage.setItem('fl_landmarks', JSON.stringify(d)); }

function renderLandmarks() {
  var data = getData();
  var search = document.getElementById('searchInput').value.trim().toLowerCase();

  var filtered = data.filter(function(l) {
    var matchFilter = currentFilter === 'all' || l.type === currentFilter;
    var matchSearch = !search || l.name.toLowerCase().indexOf(search) > -1 || (l.city && l.city.toLowerCase().indexOf(search) > -1);
    return matchFilter && matchSearch;
  });

  // Stats
  document.getElementById('countTotal').textContent = data.length;
  document.getElementById('countWithPhoto').textContent = data.filter(function(l) { return l.photoBefore || l.photoAfter; }).length;
  var cities = {};
  data.forEach(function(l) { if (l.city) cities[l.city] = 1; });
  document.getElementById('countCities').textContent = Object.keys(cities).length;

  var list = document.getElementById('landmarksList');
  list.innerHTML = '';

  if (filtered.length === 0 && !search) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">🏛</span><p class="empty-text">لم يُوثَّق أي معلم بعد.<br/>كن أول من يحفظ ذاكرة هذا المكان.</p><button class="empty-btn" onclick="openModal()">+ أضف أول معلم</button></div>';
    return;
  }

  filtered.forEach(function(l) {
    var card = document.createElement('div');
    card.className = 'landmark-card';

    var beforeHtml = l.photoBefore
      ? '<img class="ba-img" src="' + l.photoBefore + '" alt="قبل"/>'
      : '<span style="font-size:2rem;opacity:0.3;">🏛</span>';
    var afterHtml = l.photoAfter
      ? '<img class="ba-img" src="' + l.photoAfter + '" alt="بعد"/>'
      : '<span style="font-size:2rem;opacity:0.3;">💔</span>';

    var typeLabel = TYPE_LABELS[l.type] || l.type || '◈';

    card.innerHTML =
      '<div class="before-after">' +
        '<div class="ba-side ba-before">' + beforeHtml + '<span class="ba-label">قبل</span></div>' +
        '<div class="ba-divider"></div>' +
        '<div class="ba-side ba-after">' + afterHtml + '<span class="ba-label">بعد</span></div>' +
      '</div>' +
      '<div class="landmark-body">' +
        '<div class="landmark-type-row">' +
          '<span class="lm-type">' + typeLabel + '</span>' +
          '<span class="lm-status">مدمّر</span>' +
        '</div>' +
        '<div class="landmark-name">' + esc(l.name) + '</div>' +
        '<div class="landmark-meta">' +
          (l.city ? '📍 ' + esc(l.city) : '') +
          (l.builtYear ? ' · بُني ' + l.builtYear : '') +
          (l.destroyedDate ? ' · دُمِّر ' + formatDate(l.destroyedDate) : '') +
        '</div>' +
        (l.desc ? '<div class="landmark-desc">' + esc(l.desc) + '</div>' : '') +
        '<div class="landmark-footer">' +
          (l.lat && l.lng ? '<span class="lm-tag">📌 ' + l.lat + ', ' + l.lng + '</span>' : '') +
          '<span class="lm-year">' + (l.source ? '← ' + esc(l.source) : '') + '</span>' +
        '</div>' +
      '</div>';
    list.appendChild(card);
  });

  // Add button at end
  var addCard = document.createElement('div');
  addCard.className = 'add-landmark-card';
  addCard.onclick = openModal;
  addCard.innerHTML = '<span class="plus">+</span><p>أضف معلماً جديداً</p>';
  list.appendChild(addCard);
}

function filterBy(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  renderLandmarks();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { document.getElementById('lName').focus(); }, 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  resetModal();
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function resetModal() {
  ['lName','lCity','lBuiltYear','lDestroyedDate','lDesc','lLat','lLng','lSource'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('lType').value = '';
  document.getElementById('preview-before').style.display = 'none';
  document.getElementById('preview-after').style.display = 'none';
  clearGeneratedTags();
  photoBefore = null; photoAfter = null;
}

function previewSlot(input, side) {
  if (!input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    if (side === 'before') photoBefore = e.target.result;
    else photoAfter = e.target.result;
    var preview = document.getElementById('preview-' + side);
    preview.src = e.target.result;
    preview.style.display = 'block';
    input.parentElement.querySelector('.slot-icon').style.display = 'none';
    input.parentElement.querySelector('.slot-label').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function saveLandmark(e) {
  e.preventDefault();
  var landmark = {
    id: 'L_' + Date.now(),
    name: document.getElementById('lName').value.trim(),
    type: document.getElementById('lType').value,
    city: document.getElementById('lCity').value.trim(),
    builtYear: document.getElementById('lBuiltYear').value,
    destroyedDate: document.getElementById('lDestroyedDate').value,
    desc: document.getElementById('lDesc').value.trim(),
    lat: document.getElementById('lLat').value.trim(),
    lng: document.getElementById('lLng').value.trim(),
    source: document.getElementById('lSource').value.trim(),
    photoBefore: photoBefore,
    photoAfter: photoAfter,
    tags: getGeneratedTags(),
    addedAt: new Date().toISOString()
  };
  var data = getData();
  data.unshift(landmark);
  saveData(data);
  clearGeneratedTags();
  closeModal();
  renderLandmarks();
}

function getGeneratedTags() {
  var el = document.getElementById('mTags');
  if (!el || !el.value) return [];
  try { return JSON.parse(el.value); } catch(e) { return []; }
}

function clearGeneratedTags() {
  var hidden = document.getElementById('mTags');
  var output = document.getElementById('aiTagsOutput');
  if (hidden) hidden.value = '';
  if (output) {
    output.innerHTML = '';
    output.classList.add('is-empty');
  }
}

function formatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : d;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    { id: 'L2', name: 'جامعة الإسلامية — غزة', type: 'school', city: 'غزة', builtYear: '1978', destroyedDate: '2023-12-09', desc: 'أعرق الجامعات في قطاع غزة. أسّسها المفكر الإسلامي أحمد ياسين عام 1978. خرّجت عشرات الآلاف من الأطباء والمهندسين والمعلمين.', lat: '31.5027', lng: '34.4487', source: 'الذاكرة الجماعية', photoBefore: null, photoAfter: null, addedAt: new Date().toISOString() },
    { id: 'L3', name: 'مستشفى الشفاء', type: 'hospital', city: 'غزة', builtYear: '1946', destroyedDate: '2024-03-01', desc: 'أكبر مستشفى في قطاع غزة. أُسِّس في العهد البريطاني عام 1946. خدم الغزيين لأكثر من سبعة عقود. تحوّل خلال الحرب إلى رمز للصمود ثم للدمار.', lat: '31.5236', lng: '34.4502', source: 'الذاكرة الجماعية', photoBefore: null, photoAfter: null, addedAt: new Date().toISOString() }

function previewImg(inp) {
  if (!inp.files || !inp.files[0]) return;
  var reader = new FileReader();
  var preview = inp.parentElement.querySelector('img') || inp.parentElement.querySelector('.img-preview');
  reader.onload = function(e) {
    if (preview) { preview.src = e.target.result; preview.style.display='block'; }
  };
  reader.readAsDataURL(inp.files[0]);
}
